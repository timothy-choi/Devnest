# Postgres only. Run FastAPI on the host (e.g. 127.0.0.1:8000) and set frontend ``NEXT_PUBLIC_API_BASE_URL``
# to that URL for ``next dev``; there is no ``backend`` service hostname in this compose file.
services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devnest
      POSTGRES_PASSWORD: devnest
      POSTGRES_DB: devnest_dev
    volumes:
      - devnest_pg_data:/var/lib/postgresql/data

volumes:
  devnest_pg_data:

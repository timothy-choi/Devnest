name: Nightly Full Validation

# Nightly tier: runs the full repository test tree without merge-time marker exclusions.
# That includes every unmarked (merge-time) test plus heavy markers:
#   slow | topology_heavy | concurrency | failure_path | topology_linux
# and workspace_image (system workspace Dockerfile). Push/PR workflow (tests.yml) excludes those
# markers (and workspace_image / topology_linux) so CI stays fast; this job catches regressions
# in stress, failure-injection, privileged networking, and image builds.
#
# Also mirrors tests.yml jobs not covered by a single pytest: frontend checks, quality tools,
# Traefik/system-gateway stack tests, Docker Compose full-stack smoke, and optional EC2 deploy.

# Schedule: GitHub Actions cron is UTC-only (no timezone field).
# `0 8 * * *` = 08:00 UTC daily ≈ midnight America/Los_Angeles during PST (UTC−8).
# During PDT (UTC−7), the same cron runs at 01:00 Pacific. To target midnight PDT instead, use `0 7 * * *`.
#
# Scheduled workflows only run from the default branch (e.g. main). A copy of this file on another
# branch will not trigger on a timer until it is merged to default. Use workflow_dispatch to test.
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  quality-checks:
    name: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest-timeout
        run: python scripts/verify_pytest_timeout.py

      - name: Install quality tools
        run: pip install ruff black mypy pytest pytest-cov coverage pytest-timeout

      - name: Ruff (lint)
        continue-on-error: true
        run: ruff check .

      - name: Black (format check)
        continue-on-error: true
        run: black --check .

      - name: Mypy (static types)
        continue-on-error: true
        run: mypy app

      - name: Pytest with coverage (merge-tier marker subset)
        continue-on-error: true
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests/unit -m "not slow and not topology_heavy and not concurrency and not failure_path and not topology_linux and not topology_linux_core" --timeout=300 --maxfail=0 -ra --cov=app --cov-report=xml:coverage-quality.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-quality-nightly
          path: backend/coverage-quality.xml
          if-no-files-found: warn

  full-test-suite:
    name: full-test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest-timeout
        run: python scripts/verify_pytest_timeout.py

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run Alembic migrations
        run: alembic upgrade head

      # Privileged topology tests run under sudo next (topology_linux suite + topology_linux_core).
      - name: Run all tests (merge-time + heavy markers; privileged topology in next step)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: |
          pytest tests -v -m "not topology_linux and not topology_linux_core and not gateway" \
            --timeout=600 \
            --maxfail=0 -ra \
            --cov=app --cov-report=xml:nightly-full-tests-coverage.xml --cov-report=term-missing

      - name: Finalize suite coverage XML
        run: |
          if ls .coverage.* 1> /dev/null 2>&1; then
            coverage combine
          fi
          test -f .coverage
          coverage xml -o nightly-full-tests-coverage.xml

      - name: Run Linux topology tests (elevated privileges)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: sudo -E "$(which python)" -m pytest tests/system/topology -v -m "topology_linux or topology_linux_core" --timeout=600 --maxfail=0 -ra

      - name: Upload full-suite coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-tests-coverage
          path: backend/nightly-full-tests-coverage.xml
          if-no-files-found: warn

  gateway-validation:
    name: gateway-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: devnest-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: devnest-gateway/requirements-test.txt

      - name: Install gateway test dependencies
        run: pip install -r requirements-test.txt

      - name: Verify pytest-timeout
        run: |
          python -c "import pytest_timeout"
          python -m pytest --help | grep -q -- --timeout

      - name: Gateway pytest (config + compose + live route)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests -v --timeout=300 --maxfail=0 -ra

  system-gateway-tests:
    name: system-gateway-tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start system gateway stack (Traefik + route-admin + workspace-sim)
        run: docker compose -f docker-compose.system.yml up -d --build

      - name: Verify pytest-timeout
        working-directory: backend
        run: python scripts/verify_pytest_timeout.py

      - name: Run backend system gateway tests
        working-directory: backend
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests/system/gateway -v --timeout=300 --maxfail=0 -ra

      - name: Stop system gateway stack
        if: always()
        run: docker compose -f docker-compose.system.yml down -v

  # --- Full-stack Linux integration + optional EC2 (same as tests.yml deploy staging) ---

  linux-full-stack-integration:
    name: Linux full-stack (Docker Compose)
    needs:
      - full-test-suite
      - gateway-validation
      - frontend-checks
      - quality-checks
      - system-gateway-tests
    if: >-
      always() &&
      needs.full-test-suite.result == 'success' &&
      needs.gateway-validation.result == 'success' &&
      needs.system-gateway-tests.result == 'success' &&
      needs.frontend-checks.result == 'success' &&
      needs.quality-checks.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start DevNest full-stack environment
        run: docker compose -f docker-compose.integration.yml up -d --build

      - name: Wait for backend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              echo "Backend is ready."
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 5
          done
          echo "Backend failed to start."
          docker compose -f docker-compose.integration.yml logs
          exit 1

      - name: Wait for frontend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/; then
              echo "Frontend is ready."
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 5
          done
          echo "Frontend failed to start."
          docker compose -f docker-compose.integration.yml logs
          exit 1

      - name: Print runner-local stack URLs
        run: |
          echo "Full-stack smoke succeeded on the GitHub Actions runner (not reachable from the internet)."
          echo "Frontend: http://localhost:3000"
          echo "Backend API: http://localhost:8000"
          echo "API docs: http://localhost:8000/docs"

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.integration.yml logs

      - name: Stop full-stack environment
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  deploy-ec2-full-stack:
    name: Deploy full-stack to EC2
    needs: [linux-full-stack-integration]
    if: needs.linux-full-stack-integration.result == 'success'
    runs-on: ubuntu-latest
    env:
      EC2_DEPLOY_HOST: ${{ secrets.EC2_HOST }}
      EC2_DEPLOY_USER: ${{ secrets.EC2_USER }}
      EC2_DEPLOY_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Preflight — TCP port 22 reachable
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y netcat-openbsd
          nc -zvw30 "$EC2_HOST" 22

      - name: Deploy to EC2
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 2m
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            REPO_URL="https://github.com/timothy-choi/Devnest.git"
            REPO_DIR="${HOME}/Devnest"
            COMMIT_SHA="${{ github.sha }}"
            COMPOSE="${REPO_DIR}/docker-compose.integration.yml"
            if [ ! -d "${REPO_DIR}/.git" ]; then
              mkdir -p "$(dirname "${REPO_DIR}")"
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi
            cd "${REPO_DIR}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin --prune --tags
            if ! git checkout -f "${COMMIT_SHA}"; then
              echo "WARN: ${COMMIT_SHA} not in local repo yet; syncing main then retrying." >&2
              git checkout -f main
              git pull --ff-only origin main
              git checkout -f "${COMMIT_SHA}"
            fi
            if [ ! -f "${COMPOSE}" ]; then
              echo "Missing ${COMPOSE} (commit $(git rev-parse --short HEAD))." >&2
              ls -la "${REPO_DIR}" >&2
              git ls-tree -r HEAD --name-only | head -80 >&2
              exit 1
            fi
            EC2_HOST_PUBLIC="${{ secrets.EC2_HOST }}"
            if [[ "${EC2_HOST_PUBLIC}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              EC2_HOST_OAUTH="${EC2_HOST_PUBLIC//./-}.sslip.io"
            else
              EC2_HOST_OAUTH="${EC2_HOST_PUBLIC}"
            fi
            export NEXT_PUBLIC_API_BASE_URL="http://${{ secrets.EC2_HOST }}:8000"
            export DEVNEST_FRONTEND_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export GITHUB_CLIENT_ID="${{ secrets.GH_CLIENT_ID }}"
            export GITHUB_CLIENT_SECRET="${{ secrets.GH_CLIENT_SECRET }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            export SMTP_HOST="${{ secrets.SMTP_HOST }}"
            export SMTP_PORT="${{ secrets.SMTP_PORT }}"
            export SMTP_USER="${{ secrets.SMTP_USER }}"
            export SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            export SMTP_FROM_ADDRESS="${{ secrets.SMTP_FROM_ADDRESS }}"
            export SMTP_USE_TLS="${{ secrets.SMTP_USE_TLS }}"
            docker compose -f "${COMPOSE}" --project-directory "${REPO_DIR}" down || true
            docker compose -f "${COMPOSE}" --project-directory "${REPO_DIR}" up -d --build
            echo "Deployment complete."

      - name: Print DevNest URL
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        run: |
          echo "DevNest (EC2) — open in browser (security group must allow ports 3000 and 8000):"
          echo "  UI:        http://${{ env.EC2_DEPLOY_HOST }}:3000"
          echo "  API:       http://${{ env.EC2_DEPLOY_HOST }}:8000"
          echo "  API docs:  http://${{ env.EC2_DEPLOY_HOST }}:8000/docs"

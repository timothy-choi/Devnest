name: Nightly Full Validation

# Runs the full test tree including heavy markers (concurrency, topology_heavy, failure_path,
# slow) and workspace_image builds. Default CI in tests.yml excludes those for faster PRs.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality-checks:
    name: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install quality tools
        run: pip install ruff black mypy pytest pytest-cov

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (static types)
        run: mypy app

      # topology_linux needs CAP_NET_ADMIN; run under sudo in full-test-suite.
      # Includes heavy-tier tests (concurrency, failure_path, etc.); see backend/pytest.ini.
      # Integration tests require PostgreSQL (service above). System tests use the host Docker daemon.
      - name: Pytest with coverage
        run: |
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing \
            -m "not topology_linux"

      - name: Finalize coverage XML
        run: |
          if ls .coverage.* 1> /dev/null 2>&1; then
            coverage combine
          fi
          test -f .coverage
          coverage xml -o coverage.xml

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage
          path: backend/coverage.xml
          if-no-files-found: error

  full-test-suite:
    name: full-test-suite
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run all tests (excluding topology_linux; includes heavy-tier markers)
        run: |
          pytest tests -v -m "not topology_linux" \
            --cov=app --cov-report=xml:nightly-full-tests-coverage.xml --cov-report=term-missing

      - name: Finalize suite coverage XML
        run: |
          if ls .coverage.* 1> /dev/null 2>&1; then
            coverage combine
          fi
          test -f .coverage
          coverage xml -o nightly-full-tests-coverage.xml

      - name: Run Linux topology tests (elevated privileges)
        run: sudo -E "$(which python)" -m pytest tests/system/topology -v -m "topology_linux"

      - name: Upload full-suite coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-tests-coverage
          path: backend/nightly-full-tests-coverage.xml
          if-no-files-found: warn

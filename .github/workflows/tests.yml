name: Run Tests

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do sleep 1; done
      - run: pip install -r requirements.txt
      - run: pytest tests -v
name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# --- Merge-time tier (fast PR signal) ---
# Excludes pytest markers: slow, topology_heavy, concurrency, failure_path, topology_linux,
# topology_linux_core (in the non-sudo pytest pass). System job then runs sudo pytest for
# topology_linux_core only (one runtime+topology+probe happy path). Full topology_linux suite
# stays in nightly.yml under sudo.
# System job also excludes workspace_image (full workspace image build).
#
# Path filters (job `detect`): backend-only changes skip gateway tests; devnest-gateway-only
# (or root compose / traefik) changes skip heavy backend jobs. Any workflow edit
# under .github/workflows/ runs both backend and gateway jobs.
#
# Triggers: all branch pushes + all PRs + workflow_dispatch (no `on.push.paths` filter).
#
# EC2: after prior tests, deploy-staging (non-main push/dispatch) or deploy-production (main) runs
# appleboy/ssh-action + scripts/deploy-ec2.sh when EC2 secrets are set. ``linux-full-stack-integration``
# may be skipped (path filters); deploy still runs if that job is skipped, but not if it failed.
# Pull requests never deploy.
#
# --- Nightly tier ---
# See nightly.yml: full suite including heavy markers + topology_linux + workspace_image,
# frontend/quality/system-gateway jobs, Docker Compose full-stack smoke, and optional EC2 deploy.
#
# Manual run: Actions → Tests → Run workflow (workflow_dispatch).

jobs:
  detect:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      gateway: ${{ steps.filter.outputs.gateway }}
      tests_workflow: ${{ steps.filter.outputs.tests_workflow }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            gateway:
              - 'devnest-gateway/**'
              - 'traefik/**'
              - 'docker-compose*.yml'
              - 'docker-compose.system.yml'
              - 'backend/tests/system/gateway/**'
            tests_workflow:
              - '.github/workflows/**'
              - 'docker-compose.integration.yml'
              - 'frontend/Dockerfile.integration'

  gateway-tests:
    name: Gateway (data-plane)
    needs: detect
    if: needs.detect.outputs.gateway == 'true' || needs.detect.outputs.tests_workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devnest-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: devnest-gateway/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Verify pytest-timeout
        run: |
          python -c "import pytest_timeout"
          python -m pytest --help | grep -q -- --timeout

      - name: Pytest (config + compose + live whoami route)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests -v --timeout=300 --maxfail=0 -ra

  system-gateway-tests:
    name: system-gateway-tests
    needs: detect
    if: |
      needs.detect.outputs.backend == 'true' ||
      needs.detect.outputs.gateway == 'true' ||
      needs.detect.outputs.tests_workflow == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start system gateway stack (Traefik + route-admin + workspace-sim)
        run: docker compose -f docker-compose.system.yml up -d --build

      - name: Verify pytest-timeout
        working-directory: backend
        run: python scripts/verify_pytest_timeout.py

      - name: Run backend system gateway tests
        working-directory: backend
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests/system/gateway -v --timeout=300 --maxfail=0 -ra

      - name: Stop system gateway stack
        if: always()
        run: docker compose -f docker-compose.system.yml down -v

  frontend-checks:
    name: Frontend checks
    needs: detect
    if: |
      needs.detect.outputs.frontend == 'true' ||
      needs.detect.outputs.tests_workflow == 'true' ||
      needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  quality-checks:
    name: quality-checks
    needs: detect
    if: |
      needs.detect.outputs.backend == 'true' ||
      needs.detect.outputs.tests_workflow == 'true'
    runs-on: ubuntu-latest
    # Advisory only: lint/format/types/coverage do not block downstream test jobs.
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest-timeout
        run: python scripts/verify_pytest_timeout.py

      - name: Install quality tools
        run: pip install ruff black mypy pytest pytest-cov coverage pytest-timeout

      - name: Ruff (lint)
        continue-on-error: true
        run: ruff check .

      - name: Black (format check)
        continue-on-error: true
        run: black --check .

      - name: Mypy (static types)
        continue-on-error: true
        run: mypy app

      - name: Pytest with coverage
        continue-on-error: true
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        # Unit tests only; integration/system need Postgres/Docker in downstream jobs.
        run: pytest tests/unit -m "not slow and not topology_heavy and not concurrency and not failure_path and not topology_linux and not topology_linux_core" --timeout=300 --maxfail=0 -ra --cov=app --cov-report=xml:coverage-quality.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-quality
          path: backend/coverage-quality.xml
          if-no-files-found: warn

  unit-tests:
    name: Unit Tests
    needs: [detect, quality-checks]
    if: |
      needs.detect.outputs.backend == 'true' ||
      needs.detect.outputs.tests_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest-timeout
        run: python scripts/verify_pytest_timeout.py

      - name: Install coverage tools
        run: pip install coverage pytest-cov pytest-timeout

      - name: Run unit tests
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests/unit -v -n auto -m "not slow and not topology_heavy and not concurrency and not failure_path and not topology_linux and not topology_linux_core" --timeout=300 --maxfail=0 -ra --cov=app --cov-report=xml:coverage-unit.xml --cov-report=term-missing

      - name: Finalize unit coverage (combine workers if needed, then XML + report)
        run: |
          if ls .coverage.* 1> /dev/null 2>&1; then
            coverage combine
          fi
          test -f .coverage
          coverage xml -o coverage-unit.xml
          coverage report

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage-unit.xml
          if-no-files-found: error

  integration-tests:
    name: Integration Tests
    needs: [detect, quality-checks]
    if: |
      needs.detect.outputs.backend == 'true' ||
      needs.detect.outputs.tests_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest-timeout
        run: python scripts/verify_pytest_timeout.py

      - name: Install coverage tools
        run: pip install coverage pytest-cov pytest-timeout

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests/integration -v -n 2 -m "not slow and not topology_heavy and not concurrency and not failure_path and not topology_linux and not topology_linux_core" --timeout=300 --maxfail=0 -ra --cov=app --cov-report=xml:coverage-integration.xml --cov-report=term-missing

      - name: Merge-tier stress slice (worker/reconcile/topology janitor)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: |
          pytest tests/unit/workers/test_failure_handling.py \
            tests/unit/topology/test_topology_janitor.py \
            tests/unit/reconcile_service/test_reconcile_lock.py \
            tests/integration/workers/test_reconcile_runtime_integration.py \
            tests/integration/workspace/test_merge_production_gate_smoke.py \
            tests/integration/workspace/merge_ec2/test_merge_ec2_profile_lifecycle.py \
            tests/unit/cleanup_service/test_cleanup_drain.py \
            tests/unit/placement_service/test_orchestrator_binding_strict.py \
            -v --timeout=300 --maxfail=0 -ra

      - name: Finalize integration coverage (combine workers if needed, then XML + report)
        run: |
          if ls .coverage.* 1> /dev/null 2>&1; then
            coverage combine
          fi
          test -f .coverage
          coverage xml -o coverage-integration.xml
          coverage report

      - name: Upload integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: backend/coverage-integration.xml
          if-no-files-found: error

  system-tests:
    name: System Tests
    needs: [detect, quality-checks]
    if: |
      needs.detect.outputs.backend == 'true' ||
      needs.detect.outputs.tests_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test
      # Absolute path so sudo pytest appends to the same file as the non-sudo run.
      COVERAGE_FILE: ${{ github.workspace }}/backend/.coverage.system

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pytest-timeout
        run: python scripts/verify_pytest_timeout.py

      - name: Install coverage tools
        run: pip install coverage pytest-cov pytest-timeout

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run Alembic migrations
        run: alembic upgrade head

      # Docker + DB system tests only; excludes privileged topology markers (sudo steps below)
      # and workspace_image (long Dockerfile build). Same marker exclusions as unit/integration.
      - name: Run system tests (merge-time tier, non-sudo)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: pytest tests/system -v -m "not topology_linux and not topology_linux_core and not workspace_image and not slow and not topology_heavy and not concurrency and not failure_path and not gateway" --timeout=300 --maxfail=0 -ra --cov=app --cov-append --cov-report=term-missing

      - name: Run Linux topology core happy-path (sudo, CAP_NET_ADMIN)
        env:
          DEVNEST_ENFORCE_TEST_TIMEOUTS: "1"
        run: sudo -E "$(which python)" -m pytest tests/system/topology/test_runtime_topology_probe_happy_path.py -v -m "topology_linux_core" --timeout=300 --maxfail=0 -ra --cov=app --cov-append --cov-report=term-missing

      - name: Finalize system coverage (XML + report)
        run: |
          test -f .coverage.system
          coverage xml --data-file=.coverage.system -o coverage-system.xml
          coverage report --data-file=.coverage.system

      - name: Upload system coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-system
          path: backend/coverage-system.xml
          if-no-files-found: error

  # --- Full-stack Linux integration (after merge-tier tests) ---
  # Brings up PostgreSQL + API + worker + frontend via scripts/deploy_integration.sh (same as local one-command flow).
  # Runner-local URLs are for logs only; persistent access requires EC2 deploy (deploy-staging / deploy-production).

  linux-full-stack-integration:
    name: Linux full-stack (Docker Compose)
    needs:
      - detect
      - gateway-tests
      - system-gateway-tests
      - frontend-checks
      - quality-checks
      - unit-tests
      - integration-tests
      - system-tests
    if: >-
      (
        needs.detect.outputs.backend == 'true' ||
        needs.detect.outputs.gateway == 'true' ||
        needs.detect.outputs.tests_workflow == 'true'
      ) &&
      needs.detect.result == 'success' &&
      needs.unit-tests.result != 'failure' && needs.unit-tests.result != 'cancelled' &&
      needs.integration-tests.result != 'failure' && needs.integration-tests.result != 'cancelled' &&
      needs.system-tests.result != 'failure' && needs.system-tests.result != 'cancelled' &&
      (needs.gateway-tests.result == 'success' || needs.gateway-tests.result == 'skipped') &&
      (needs.system-gateway-tests.result == 'success' || needs.system-gateway-tests.result == 'skipped') &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') &&
      needs.gateway-tests.result != 'failure' && needs.gateway-tests.result != 'cancelled' &&
      needs.system-gateway-tests.result != 'failure' && needs.system-gateway-tests.result != 'cancelled' &&
      needs.frontend-checks.result != 'failure' && needs.frontend-checks.result != 'cancelled' &&
      needs.quality-checks.result != 'failure' && needs.quality-checks.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Empty env file for compose --env-file (bundled Postgres + compose defaults); same path for down/logs.
      DEVNEST_INTEGRATION_ENV_FILE: /tmp/devnest-integration-ci.env
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start DevNest full-stack environment
        run: |
          : > "${DEVNEST_INTEGRATION_ENV_FILE}"
          ENV_FILE="${DEVNEST_INTEGRATION_ENV_FILE}" ./scripts/deploy_integration.sh

      - name: Print runner-local stack URLs
        run: |
          echo "Full-stack smoke succeeded on the GitHub Actions runner (not reachable from the internet)."
          echo "Frontend: http://localhost:3000"
          echo "Backend API: http://localhost:8000"
          echo "API docs: http://localhost:8000/docs"

      - name: Dump container logs on failure
        if: failure()
        run: docker compose --env-file "${DEVNEST_INTEGRATION_ENV_FILE}" -f docker-compose.integration.yml logs

      - name: Stop full-stack environment
        if: always()
        run: docker compose --env-file "${DEVNEST_INTEGRATION_ENV_FILE}" -f docker-compose.integration.yml down -v

  # Branch-based EC2 deploy: staging = non-main pushes (and manual dispatch on that ref);
  # production = main only. Pull requests never deploy (event_name is pull_request).
  deploy-staging:
    name: Deploy to EC2 (staging)
    needs:
      - detect
      - gateway-tests
      - system-gateway-tests
      - frontend-checks
      - quality-checks
      - unit-tests
      - integration-tests
      - system-tests
      - linux-full-stack-integration
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref != 'refs/heads/main' &&
      (needs.linux-full-stack-integration.result == 'success' || needs.linux-full-stack-integration.result == 'skipped') &&
      needs.detect.result == 'success' &&
      needs.unit-tests.result != 'failure' && needs.unit-tests.result != 'cancelled' &&
      needs.integration-tests.result != 'failure' && needs.integration-tests.result != 'cancelled' &&
      needs.system-tests.result != 'failure' && needs.system-tests.result != 'cancelled' &&
      (needs.gateway-tests.result == 'success' || needs.gateway-tests.result == 'skipped') &&
      (needs.system-gateway-tests.result == 'success' || needs.system-gateway-tests.result == 'skipped') &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') &&
      needs.gateway-tests.result != 'failure' && needs.gateway-tests.result != 'cancelled' &&
      needs.system-gateway-tests.result != 'failure' && needs.system-gateway-tests.result != 'cancelled' &&
      needs.frontend-checks.result != 'failure' && needs.frontend-checks.result != 'cancelled' &&
      needs.quality-checks.result != 'failure' && needs.quality-checks.result != 'cancelled'
    runs-on: ubuntu-latest
    env:
      EC2_DEPLOY_HOST: ${{ secrets.EC2_HOST }}
      EC2_DEPLOY_USER: ${{ secrets.EC2_USER }}
      EC2_DEPLOY_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Preflight — TCP port 22 reachable
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y netcat-openbsd
          nc -zvw30 "$EC2_HOST" 22

      - name: Deploy staging branch to EC2
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 2m
          command_timeout: 45m
          script: |
            set -e
            echo "Deploying branch: ${{ github.ref_name }}"
            EC2_HOST_PUBLIC="${{ secrets.EC2_HOST }}"
            if [[ "${EC2_HOST_PUBLIC}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              EC2_HOST_OAUTH="${EC2_HOST_PUBLIC//./-}.sslip.io"
            else
              EC2_HOST_OAUTH="${EC2_HOST_PUBLIC}"
            fi
            export NEXT_PUBLIC_API_BASE_URL="http://${{ secrets.EC2_HOST }}:8000"
            export DEVNEST_REQUIRE_EXTERNAL_DB="1"
            export SMTP_HOST="${{ secrets.SMTP_HOST }}"
            export SMTP_PORT="${{ secrets.SMTP_PORT }}"
            export SMTP_USER="${{ secrets.SMTP_USER }}"
            export SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            export SMTP_FROM_ADDRESS="${{ secrets.SMTP_FROM_ADDRESS }}"
            export SMTP_USE_TLS="${{ secrets.SMTP_USE_TLS }}"
            export DEVNEST_DEPLOY_DIR="${HOME}/Devnest"
            if [ ! -d "${DEVNEST_DEPLOY_DIR}/.git" ]; then
              git clone https://github.com/timothy-choi/Devnest.git "${DEVNEST_DEPLOY_DIR}"
            fi
            cd "${DEVNEST_DEPLOY_DIR}"
            git fetch origin
            if [ ! -f scripts/deploy-ec2.sh ]; then
              git checkout -f main
              git reset --hard origin/main
            fi
            # fetch alone does not update the worktree; checkout so repo scripts match the branch being deployed
            git fetch origin "${{ github.ref_name }}"
            git checkout -f "${{ github.ref_name }}" 2>/dev/null || git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            export DEVNEST_CI_WRITE_FRONTEND_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_GITHUB_OAUTH_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_GCLOUD_OAUTH_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_BASE_DOMAIN="${EC2_HOST_OAUTH}"
            export DEVNEST_CI_WRITE_GATEWAY_PUBLIC_SCHEME="http"
            export DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT="${{ vars.DEVNEST_GATEWAY_PUBLIC_PORT }}"
            if [ -z "${DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT}" ]; then export DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT="9081"; fi
            export DEVNEST_CI_WRITE_NEXT_PUBLIC_API_BASE_URL="http://${{ secrets.EC2_HOST }}:8000"
            export DEVNEST_CI_WRITE_NEXT_PUBLIC_APP_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_OAUTH_GITHUB_ID="${{ secrets.OAUTH_GITHUB_CLIENT_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_ID}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_ID="${{ secrets.GH_CLIENT_ID }}"; fi
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_ID}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_ID="${{ secrets.GITHUB_CLIENT_ID }}"; fi
            export DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET="${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET="${{ secrets.GH_CLIENT_SECRET }}"; fi
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET="${{ secrets.GITHUB_CLIENT_SECRET }}"; fi
            export DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID}" ]; then export DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID="${{ secrets.GOOGLE_CLIENT_ID }}"; fi
            export DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET}" ]; then export DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"; fi
            export DEVNEST_CI_WRITE_DATABASE_URL="${{ secrets.DATABASE_URL }}"
            if [ -z "${DEVNEST_CI_WRITE_DATABASE_URL}" ]; then export DEVNEST_CI_WRITE_DATABASE_URL="${{ secrets.DEVNEST_DATABASE_URL }}"; fi
            export DEVNEST_CI_WRITE_S3_BUCKET="${{ secrets.DEVNEST_S3_SNAPSHOT_BUCKET }}"
            export DEVNEST_CI_WRITE_AWS_REGION="${{ secrets.AWS_REGION }}"
            if [ -z "${DEVNEST_CI_WRITE_AWS_REGION}" ]; then export DEVNEST_CI_WRITE_AWS_REGION="${{ vars.AWS_REGION }}"; fi
            export DEVNEST_CI_WRITE_S3_PREFIX="${{ vars.DEVNEST_S3_SNAPSHOT_PREFIX }}"
            export DEVNEST_CI_WRITE_SNAPSHOT_PROVIDER="s3"
            _ak="${{ secrets.AWS_ACCESS_KEY_ID }}"
            _sk="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            if [ -n "${_ak}" ]; then export DEVNEST_CI_WRITE_AWS_ACCESS_KEY_ID="${_ak}"; fi
            if [ -n "${_sk}" ]; then export DEVNEST_CI_WRITE_AWS_SECRET_ACCESS_KEY="${_sk}"; fi
            export DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE="${{ secrets.DEVNEST_WORKSPACE_CONTAINER_IMAGE }}"
            if [ -z "${DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE}" ]; then export DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE="${{ vars.DEVNEST_WORKSPACE_CONTAINER_IMAGE }}"; fi
            export DEVNEST_CI_WRITE_EC2_AMI_ID="${{ secrets.DEVNEST_EC2_AMI_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_AMI_ID}" ]; then export DEVNEST_CI_WRITE_EC2_AMI_ID="${{ vars.DEVNEST_EC2_AMI_ID }}"; fi
            export DEVNEST_CI_WRITE_EC2_SUBNET_ID="${{ secrets.DEVNEST_EC2_SUBNET_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_SUBNET_ID}" ]; then export DEVNEST_CI_WRITE_EC2_SUBNET_ID="${{ vars.DEVNEST_EC2_SUBNET_ID }}"; fi
            export DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS="${{ secrets.DEVNEST_EC2_SECURITY_GROUP_IDS }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS}" ]; then export DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS="${{ vars.DEVNEST_EC2_SECURITY_GROUP_IDS }}"; fi
            export DEVNEST_CI_WRITE_EC2_INSTANCE_TYPE="${{ vars.DEVNEST_EC2_INSTANCE_TYPE }}"
            export DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE="${{ secrets.DEVNEST_EC2_INSTANCE_PROFILE }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE}" ]; then export DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE="${{ vars.DEVNEST_EC2_INSTANCE_PROFILE }}"; fi
            python3 scripts/write_integration_deploy_env.py write
            cp .env.integration "${HOME}/.devnest-env-integration.backup"
            chmod 600 "${HOME}/.devnest-env-integration.backup"
            bash scripts/setup-env.sh
            unset DEVNEST_CI_WRITE_DATABASE_URL DEVNEST_CI_WRITE_S3_BUCKET DEVNEST_CI_WRITE_AWS_REGION DEVNEST_CI_WRITE_S3_PREFIX DEVNEST_CI_WRITE_SNAPSHOT_PROVIDER DEVNEST_CI_WRITE_AWS_ACCESS_KEY_ID DEVNEST_CI_WRITE_AWS_SECRET_ACCESS_KEY DEVNEST_CI_WRITE_FRONTEND_PUBLIC_BASE_URL DEVNEST_CI_WRITE_GITHUB_OAUTH_PUBLIC_BASE_URL DEVNEST_CI_WRITE_GCLOUD_OAUTH_PUBLIC_BASE_URL DEVNEST_CI_WRITE_BASE_DOMAIN DEVNEST_CI_WRITE_GATEWAY_PUBLIC_SCHEME DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT DEVNEST_CI_WRITE_NEXT_PUBLIC_API_BASE_URL DEVNEST_CI_WRITE_NEXT_PUBLIC_APP_BASE_URL DEVNEST_CI_WRITE_OAUTH_GITHUB_ID DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE DEVNEST_CI_WRITE_EC2_AMI_ID DEVNEST_CI_WRITE_EC2_SUBNET_ID DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS DEVNEST_CI_WRITE_EC2_INSTANCE_TYPE DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE || true
            unset _ak _sk || true
            bash scripts/deploy-ec2.sh "${{ github.ref_name }}"

      - name: Print DevNest URL (staging)
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        run: |
          echo "Staging deploy — DevNest (EC2); security group must allow TCP 22, 3000, 8000:"
          echo "  UI:        http://${{ env.EC2_DEPLOY_HOST }}:3000"
          echo "  API:       http://${{ env.EC2_DEPLOY_HOST }}:8000"
          echo "  API docs:  http://${{ env.EC2_DEPLOY_HOST }}:8000/docs"
          echo "  Branch:    ${{ github.ref_name }}"

  deploy-production:
    name: Deploy to EC2 (production)
    needs:
      - detect
      - gateway-tests
      - system-gateway-tests
      - frontend-checks
      - quality-checks
      - unit-tests
      - integration-tests
      - system-tests
      - linux-full-stack-integration
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (needs.linux-full-stack-integration.result == 'success' || needs.linux-full-stack-integration.result == 'skipped') &&
      needs.detect.result == 'success' &&
      needs.unit-tests.result != 'failure' && needs.unit-tests.result != 'cancelled' &&
      needs.integration-tests.result != 'failure' && needs.integration-tests.result != 'cancelled' &&
      needs.system-tests.result != 'failure' && needs.system-tests.result != 'cancelled' &&
      (needs.gateway-tests.result == 'success' || needs.gateway-tests.result == 'skipped') &&
      (needs.system-gateway-tests.result == 'success' || needs.system-gateway-tests.result == 'skipped') &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') &&
      needs.gateway-tests.result != 'failure' && needs.gateway-tests.result != 'cancelled' &&
      needs.system-gateway-tests.result != 'failure' && needs.system-gateway-tests.result != 'cancelled' &&
      needs.frontend-checks.result != 'failure' && needs.frontend-checks.result != 'cancelled' &&
      needs.quality-checks.result != 'failure' && needs.quality-checks.result != 'cancelled'
    runs-on: ubuntu-latest
    env:
      EC2_DEPLOY_HOST: ${{ secrets.EC2_HOST }}
      EC2_DEPLOY_USER: ${{ secrets.EC2_USER }}
      EC2_DEPLOY_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Preflight — TCP port 22 reachable
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y netcat-openbsd
          nc -zvw30 "$EC2_HOST" 22

      - name: Deploy production (main) to EC2
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 2m
          command_timeout: 45m
          script: |
            set -e
            echo "Deploying production branch: main"
            EC2_HOST_PUBLIC="${{ secrets.EC2_HOST }}"
            if [[ "${EC2_HOST_PUBLIC}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              EC2_HOST_OAUTH="${EC2_HOST_PUBLIC//./-}.sslip.io"
            else
              EC2_HOST_OAUTH="${EC2_HOST_PUBLIC}"
            fi
            export NEXT_PUBLIC_API_BASE_URL="http://${{ secrets.EC2_HOST }}:8000"
            export DEVNEST_REQUIRE_EXTERNAL_DB="1"
            export SMTP_HOST="${{ secrets.SMTP_HOST }}"
            export SMTP_PORT="${{ secrets.SMTP_PORT }}"
            export SMTP_USER="${{ secrets.SMTP_USER }}"
            export SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            export SMTP_FROM_ADDRESS="${{ secrets.SMTP_FROM_ADDRESS }}"
            export SMTP_USE_TLS="${{ secrets.SMTP_USE_TLS }}"
            export DEVNEST_DEPLOY_DIR="${HOME}/Devnest"
            if [ ! -d "${DEVNEST_DEPLOY_DIR}/.git" ]; then
              git clone https://github.com/timothy-choi/Devnest.git "${DEVNEST_DEPLOY_DIR}"
            fi
            cd "${DEVNEST_DEPLOY_DIR}"
            git fetch origin
            if [ ! -f scripts/deploy-ec2.sh ]; then
              git checkout -f main
              git reset --hard origin/main
            fi
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            export DEVNEST_CI_WRITE_FRONTEND_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_GITHUB_OAUTH_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_GCLOUD_OAUTH_PUBLIC_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_BASE_DOMAIN="${EC2_HOST_OAUTH}"
            export DEVNEST_CI_WRITE_GATEWAY_PUBLIC_SCHEME="http"
            export DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT="${{ vars.DEVNEST_GATEWAY_PUBLIC_PORT }}"
            if [ -z "${DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT}" ]; then export DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT="9081"; fi
            export DEVNEST_CI_WRITE_NEXT_PUBLIC_API_BASE_URL="http://${{ secrets.EC2_HOST }}:8000"
            export DEVNEST_CI_WRITE_NEXT_PUBLIC_APP_BASE_URL="http://${EC2_HOST_OAUTH}:3000"
            export DEVNEST_CI_WRITE_OAUTH_GITHUB_ID="${{ secrets.OAUTH_GITHUB_CLIENT_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_ID}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_ID="${{ secrets.GH_CLIENT_ID }}"; fi
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_ID}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_ID="${{ secrets.GITHUB_CLIENT_ID }}"; fi
            export DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET="${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET="${{ secrets.GH_CLIENT_SECRET }}"; fi
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET}" ]; then export DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET="${{ secrets.GITHUB_CLIENT_SECRET }}"; fi
            export DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID}" ]; then export DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID="${{ secrets.GOOGLE_CLIENT_ID }}"; fi
            export DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}"
            if [ -z "${DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET}" ]; then export DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"; fi
            export DEVNEST_CI_WRITE_DATABASE_URL="${{ secrets.DATABASE_URL }}"
            if [ -z "${DEVNEST_CI_WRITE_DATABASE_URL}" ]; then export DEVNEST_CI_WRITE_DATABASE_URL="${{ secrets.DEVNEST_DATABASE_URL }}"; fi
            export DEVNEST_CI_WRITE_S3_BUCKET="${{ secrets.DEVNEST_S3_SNAPSHOT_BUCKET }}"
            export DEVNEST_CI_WRITE_AWS_REGION="${{ secrets.AWS_REGION }}"
            if [ -z "${DEVNEST_CI_WRITE_AWS_REGION}" ]; then export DEVNEST_CI_WRITE_AWS_REGION="${{ vars.AWS_REGION }}"; fi
            export DEVNEST_CI_WRITE_S3_PREFIX="${{ vars.DEVNEST_S3_SNAPSHOT_PREFIX }}"
            export DEVNEST_CI_WRITE_SNAPSHOT_PROVIDER="s3"
            _ak="${{ secrets.AWS_ACCESS_KEY_ID }}"
            _sk="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            if [ -n "${_ak}" ]; then export DEVNEST_CI_WRITE_AWS_ACCESS_KEY_ID="${_ak}"; fi
            if [ -n "${_sk}" ]; then export DEVNEST_CI_WRITE_AWS_SECRET_ACCESS_KEY="${_sk}"; fi
            export DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE="${{ secrets.DEVNEST_WORKSPACE_CONTAINER_IMAGE }}"
            if [ -z "${DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE}" ]; then export DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE="${{ vars.DEVNEST_WORKSPACE_CONTAINER_IMAGE }}"; fi
            export DEVNEST_CI_WRITE_EC2_AMI_ID="${{ secrets.DEVNEST_EC2_AMI_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_AMI_ID}" ]; then export DEVNEST_CI_WRITE_EC2_AMI_ID="${{ vars.DEVNEST_EC2_AMI_ID }}"; fi
            export DEVNEST_CI_WRITE_EC2_SUBNET_ID="${{ secrets.DEVNEST_EC2_SUBNET_ID }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_SUBNET_ID}" ]; then export DEVNEST_CI_WRITE_EC2_SUBNET_ID="${{ vars.DEVNEST_EC2_SUBNET_ID }}"; fi
            export DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS="${{ secrets.DEVNEST_EC2_SECURITY_GROUP_IDS }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS}" ]; then export DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS="${{ vars.DEVNEST_EC2_SECURITY_GROUP_IDS }}"; fi
            export DEVNEST_CI_WRITE_EC2_INSTANCE_TYPE="${{ vars.DEVNEST_EC2_INSTANCE_TYPE }}"
            export DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE="${{ secrets.DEVNEST_EC2_INSTANCE_PROFILE }}"
            if [ -z "${DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE}" ]; then export DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE="${{ vars.DEVNEST_EC2_INSTANCE_PROFILE }}"; fi
            python3 scripts/write_integration_deploy_env.py write
            cp .env.integration "${HOME}/.devnest-env-integration.backup"
            chmod 600 "${HOME}/.devnest-env-integration.backup"
            bash scripts/setup-env.sh
            unset DEVNEST_CI_WRITE_DATABASE_URL DEVNEST_CI_WRITE_S3_BUCKET DEVNEST_CI_WRITE_AWS_REGION DEVNEST_CI_WRITE_S3_PREFIX DEVNEST_CI_WRITE_SNAPSHOT_PROVIDER DEVNEST_CI_WRITE_AWS_ACCESS_KEY_ID DEVNEST_CI_WRITE_AWS_SECRET_ACCESS_KEY DEVNEST_CI_WRITE_FRONTEND_PUBLIC_BASE_URL DEVNEST_CI_WRITE_GITHUB_OAUTH_PUBLIC_BASE_URL DEVNEST_CI_WRITE_GCLOUD_OAUTH_PUBLIC_BASE_URL DEVNEST_CI_WRITE_BASE_DOMAIN DEVNEST_CI_WRITE_GATEWAY_PUBLIC_SCHEME DEVNEST_CI_WRITE_GATEWAY_PUBLIC_PORT DEVNEST_CI_WRITE_NEXT_PUBLIC_API_BASE_URL DEVNEST_CI_WRITE_NEXT_PUBLIC_APP_BASE_URL DEVNEST_CI_WRITE_OAUTH_GITHUB_ID DEVNEST_CI_WRITE_OAUTH_GITHUB_SECRET DEVNEST_CI_WRITE_OAUTH_GOOGLE_ID DEVNEST_CI_WRITE_OAUTH_GOOGLE_SECRET DEVNEST_CI_WRITE_WORKSPACE_CONTAINER_IMAGE DEVNEST_CI_WRITE_EC2_AMI_ID DEVNEST_CI_WRITE_EC2_SUBNET_ID DEVNEST_CI_WRITE_EC2_SECURITY_GROUP_IDS DEVNEST_CI_WRITE_EC2_INSTANCE_TYPE DEVNEST_CI_WRITE_EC2_INSTANCE_PROFILE || true
            unset _ak _sk || true
            bash scripts/deploy-ec2.sh main

      - name: Print DevNest URL (production)
        if: ${{ env.EC2_DEPLOY_HOST != '' && env.EC2_DEPLOY_USER != '' && env.EC2_DEPLOY_KEY != '' }}
        run: |
          echo "Production deploy — DevNest (EC2); security group must allow TCP 22, 3000, 8000:"
          echo "  UI:        http://${{ env.EC2_DEPLOY_HOST }}:3000"
          echo "  API:       http://${{ env.EC2_DEPLOY_HOST }}:8000"
          echo "  API docs:  http://${{ env.EC2_DEPLOY_HOST }}:8000/docs"
          echo "  Branch:    main"

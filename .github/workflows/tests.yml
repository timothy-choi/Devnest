name: Tests

on:
  push:
    branches:
      - "**"
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install quality tools
        run: pip install ruff black mypy pytest pytest-cov

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (static types)
        run: mypy app

      - name: Pytest with coverage
        # Unit tests only; integration/system need Postgres/Docker in downstream jobs.
        run: pytest tests/unit --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: error

  unit-tests:
    name: Unit Tests
    needs: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit -v -n auto

  integration-tests:
    name: Integration Tests
    needs: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run integration tests
        run: pytest tests/integration -v -n 2

  system-tests:
    name: System Tests
    needs: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d devnest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/devnest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test -d devnest_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run non-topology system tests
        run: pytest tests/system -v -m "not topology_linux"

      - name: Run topology Linux system tests
        run: sudo -E "$(which python)" -m pytest tests/system/topology -v -m "topology_linux"

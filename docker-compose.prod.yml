# DevNest production-like docker-compose
# ----------------------------------------
# Usage:
#   cp .env.example .env           # fill in secrets
#   # External Postgres / RDS (default path):
#   docker compose -f docker-compose.prod.yml up -d api
#   # Local self-hosted Postgres for smoke/prod-like testing:
#   docker compose -f docker-compose.prod.yml --profile local-postgres up -d
#
# Services:
#   postgres      — managed DB (consider RDS in real production)
#   api           — FastAPI backend with built-in job worker and reconcile loop
#                   (DEVNEST_WORKER_ENABLED=true, DEVNEST_RECONCILE_ENABLED=true)
#
# The reconcile loop runs as a background task inside the API process.
# To run it as a separate process, scale the api service or run a second instance with
# DEVNEST_WORKER_ENABLED=false and DEVNEST_RECONCILE_ENABLED=true.
#
# For real production, run DB migrations before starting services:
#   docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
#
# External Postgres / RDS:
#   Set DATABASE_URL to your managed Postgres DSN and the API will use it instead of the local
#   ``postgres`` service. The bundled Postgres container is only started when the
#   ``local-postgres`` profile is enabled.

version: "3.9"

x-backend-common: &backend-common
  image: devnest-backend:latest
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - .env
    - ./backend/.env
  environment:
    DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://devnest:${POSTGRES_PASSWORD}@postgres:5432/devnest}
    DEVNEST_REQUIRE_SECRETS: "true"
  restart: unless-stopped

services:
  postgres:
    image: postgres:15
    profiles: ["local-postgres"]
    environment:
      POSTGRES_USER: devnest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: devnest
    volumes:
      - devnest_pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devnest"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    <<: *backend-common
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://devnest:${POSTGRES_PASSWORD}@postgres:5432/devnest}
      DEVNEST_REQUIRE_SECRETS: "true"
      # Built-in background job worker — runs inside the API process.
      DEVNEST_WORKER_ENABLED: "${DEVNEST_WORKER_ENABLED:-true}"
      DEVNEST_WORKER_POLL_INTERVAL_SECONDS: "${DEVNEST_WORKER_POLL_INTERVAL_SECONDS:-5}"
      DEVNEST_WORKER_BATCH_SIZE: "${DEVNEST_WORKER_BATCH_SIZE:-5}"
      # Automated reconcile loop.
      DEVNEST_RECONCILE_ENABLED: "${DEVNEST_RECONCILE_ENABLED:-true}"
      DEVNEST_RECONCILE_INTERVAL_SECONDS: "${DEVNEST_RECONCILE_INTERVAL_SECONDS:-30}"
      # Rate limiting.
      DEVNEST_RATE_LIMIT_ENABLED: "${DEVNEST_RATE_LIMIT_ENABLED:-true}"
      # Gateway auth enforcement.
      DEVNEST_GATEWAY_AUTH_ENABLED: "${DEVNEST_GATEWAY_AUTH_ENABLED:-false}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

volumes:
  devnest_pg_data:

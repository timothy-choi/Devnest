# DevNest gateway — dynamic routing (Traefik file provider, watch: true).
#
# V1: edit this file and save; Traefik reloads routes without restarting the container.
#
# TODO: Dynamic registration from control plane (HTTP provider, Redis, or route-sync sidecar).
# TODO: Template hosts from DEVNEST_BASE_DOMAIN (today labels are literal; change when templating exists).

http:
  routers:
    # -------------------------------------------------------------------------
    # PRIMARY V1 EXAMPLE (documented hostname → host upstream)
    # Host: ws-123.app.devnest.local
    # Upstream: HTTP server on the Docker host (code-server, python -m http.server, etc.)
    # Default port 8080 — change the service URL below if you use another port.
    # WebSocket: Traefik forwards Upgrade/Connection for HTTP/1.1 by default.
    # -------------------------------------------------------------------------
    devnest-ws-123:
      rule: "Host(`ws-123.app.devnest.local`)"
      entryPoints:
        - web
      service: devnest-ws-123-upstream

    # -------------------------------------------------------------------------
    # Zero-dependency smoke test (Compose only — no process on host port 8080 required)
    # Host: whoami.app.devnest.local → traefik/whoami container on the compose network
    # -------------------------------------------------------------------------
    devnest-smoke-whoami:
      rule: "Host(`whoami.app.devnest.local`)"
      entryPoints:
        - web
      service: devnest-mock-upstream

    # -------------------------------------------------------------------------
    # Optional: path-scoped routing (same host, prefix) — uncomment to experiment
    # -------------------------------------------------------------------------
    # devnest-ws-123-api-prefix:
    #   rule: "Host(`ws-123.app.devnest.local`) && PathPrefix(`/api`)"
    #   entryPoints:
    #     - web
    #   service: devnest-ws-123-upstream
    #   priority: 100

  services:
    devnest-ws-123-upstream:
      loadBalancer:
        servers:
          # host.docker.internal → your machine (see docker-compose extra_hosts).
          - url: "http://host.docker.internal:8080"

    devnest-mock-upstream:
      loadBalancer:
        servers:
          - url: "http://mock-upstream:80"

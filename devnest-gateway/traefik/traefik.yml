# DevNest gateway â€” static Traefik configuration.
#
# TLS / HTTPS:
#   - Local/dev:    DEVNEST_TLS_ENABLED=false (default). Published ``web`` (:80) is typical; ``websecure``
#                   (:443) stays available for routers that request TLS (self-signed or ACME per-router).
#   - Dev with TLS: DEVNEST_TLS_ENABLED=true, DEVNEST_TLS_RESOLVER=none.
#                   Traefik generates a self-signed certificate for the websecure entrypoint.
#   - Production:   DEVNEST_TLS_ENABLED=true, DEVNEST_TLS_RESOLVER=letsencrypt (or cloudflare).
#                   Set DEVNEST_ACME_EMAIL and ensure port 443 is publicly reachable.
#
# See docs/DEPLOYMENT.md for full TLS setup instructions.
# TODO: Restrict dashboard/API in production (disable insecure dashboard or add BasicAuth/IP allow-list).

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    # HTTP â†’ HTTPS redirect is applied per-router via the devnest-https-redirect middleware
    # (defined in traefik/dynamic/000-base.yml) when TLS is enabled. Not wired globally here
    # so local/dev traffic on port 80 is unaffected.

  websecure:
    address: ":443"
    # TLS is negotiated per-router (tls: {} on the router). When no certificatesResolver is set
    # on the router, Traefik uses its built-in self-signed fallback certificate (dev/local).
    # In production set tls.certResolver on each router or via the defaultGeneratedCert option.

providers:
  file:
    # Merges all *.yml in this directory (000-base.yml static + 100-workspaces.yml from route-admin).
    directory: /etc/traefik/dynamic
    watch: true
  # TODO: Add providers.http pointing at control-plane route registry when implemented.
  # TODO: Add providers.redis or Kubernetes CRD for multi-replica dynamic state.

# ACME / Let's Encrypt (production API HTTPS on api.<domain>).
#
# Workspace legacy routes can stay HTTP-only on host :9081 â†’ container :80 (DEVNEST_TLS_ENABLED=false for route-admin).
# API TLS uses ``dynamic/051-api-https-letsencrypt.yml`` (``051-api-https-letsencrypt.yml.example`` is a copy template).
#
# Required on the Traefik container / host:
#   - Set DEVNEST_ACME_EMAIL to a working contact address (Let's Encrypt requirement).
#   - Persist ``/etc/traefik/acme/acme.json`` (named volume; see ``docker-compose.ec2-api-https.yml``).
#   - Publish host ``443:443`` to Traefik ``websecure`` (and ``80:80`` if you use httpChallenge below).
#
# Resolver ``letsencrypt`` uses TLS-ALPN-01 (``tlsChallenge``) on ``websecure`` (:443). Set
# ``DEVNEST_ACME_EMAIL`` on the Traefik container (see docker-compose). Persist ``acme.json`` via
# ``docker-compose.ec2-api-https.yml`` (named volume) on EC2.
#
# Optional alternatives (comment out ``tlsChallenge`` and use one block): HTTP-01 needs public
# ``80:80`` to ``web``; DNS-01 (e.g. Cloudflare) needs ``CF_DNS_API_TOKEN`` â€” see Traefik ACME docs.

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${DEVNEST_ACME_EMAIL}
      storage: /etc/traefik/acme/acme.json
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}

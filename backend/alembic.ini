# alembic.ini — Alembic migration configuration for DevNest backend.
#
# Usage (from the backend/ directory):
#   alembic upgrade head           — apply all pending migrations
#   alembic downgrade -1           — roll back the most recent migration
#   alembic revision --autogenerate -m "describe change"  — scaffold a new migration
#   alembic current                — show the current revision(s) applied
#   alembic history --verbose      — full revision history
#
# EXISTING DEPLOYMENTS (previously managed by SQLModel.metadata.create_all):
#   alembic stamp 0001             — marks the baseline as applied without re-running it
#   alembic upgrade head           — then applies revisions 0002–latest

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# File naming template for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend backend/ to sys.path so `app.*` imports resolve inside env.py.
prepend_sys_path = .

# Use os.sep as version separator (safe cross-platform).
version_path_separator = os

# SQLAlchemy URL is overridden at runtime by env.py from get_settings().database_url (same as the API).
# Leave empty here so env.py always wins.
sqlalchemy.url =


# ── Logging ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

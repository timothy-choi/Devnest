[pytest]
testpaths = tests
pythonpath = .

# =============================================================================
# CI test tiers (merge-time vs nightly)
# =============================================================================
#
# MERGE-TIME (push / pull_request): .github/workflows/tests.yml
#   pytest -m "not slow and not topology_heavy and not concurrency and not failure_path
#              and not topology_linux"
#   System job additionally excludes workspace_image (Dockerfile workspace build).
#   Unmarked tests are the default fast path — add markers only when a test is intentionally
#   slow, privileged, or stress-oriented.
#
# NIGHTLY (schedule / workflow_dispatch): .github/workflows/nightly.yml
#   Runs the full tree without the merge-time exclusions (heavy markers included).
#   topology_linux still runs under sudo in a dedicated step (CAP_NET_ADMIN).
#   The set {slow, topology_heavy, concurrency, failure_path, topology_linux} is a subset of
#   what nightly runs; nightly also runs every unmarked merge-time test for regression coverage.
#
# When adding tests: prefer leaving new correctness tests unmarked; mark only what must not
# block every PR (concurrency, failure injection, large topology scenarios, real Linux networking,
# workspace image builds).
# =============================================================================

markers =
    system: requires a local Docker daemon (see tests/system/)
    workspace_image: builds Dockerfile.workspace and smoke-tests code-server (slow; see tests/system/workspace/)
    topology_linux: Linux host with CAP_NET_ADMIN and Docker for real bridge/veth (see tests/system/topology/README.md)
    slow: slower or more resource-heavy than typical unit/integration tests; excluded from default CI
    topology_heavy: many topology DB scenarios or allocation stress; excluded from default CI
    concurrency: uses threads/tasks to stress races; excluded from default CI
    failure_path: rollback, flaky commit, or injected Linux/DB failures; excluded from default CI
